<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kevin Haus — Reel</title>
  <meta name="robots" content="noindex, nofollow">
  <script src="https://cdn.jsdelivr.net/npm/@mux/mux-player" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        rgb(230, 230, 230);
      --bg2:       rgb(218, 218, 218);
      --text:      #0a0a0a;
      --muted:     #666;
      --border:    #c8c8c8;
      --accent:    #fe0000;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Albertus', 'Palatino Linotype', Palatino, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    @font-face {
      font-family: 'Albertus';
      src: url('/fonts/AlbertusMT.woff2') format('woff2'),
           url('/fonts/AlbertusMT.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    /* ── HEADER ──────────────────────────────────────────── */
    .reel-header {
      padding: 1.5rem 2rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .reel-header img {
      height: 36px;
      width: auto;
    }

    /* ── MAIN LAYOUT ─────────────────────────────────────── */
    .reel-layout {
      display: flex;
      flex: 1;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      padding: 2rem;
      gap: 2rem;
    }

    /* ── PLAYER SIDE ─────────────────────────────────────── */
    .reel-player-col {
      flex: 1;
      min-width: 0;
    }

    .reel-player-wrap {
      width: 100%;
      background: #000;
      position: relative;
    }

    .reel-player-wrap[data-ratio="16:9"]  { aspect-ratio: 16/9; }
    .reel-player-wrap[data-ratio="4:3"]   { aspect-ratio: 4/3; }
    .reel-player-wrap[data-ratio="12:5"]  { aspect-ratio: 12/5; }
    .reel-player-wrap[data-ratio="1:1"]   { aspect-ratio: 1/1; }

    mux-player {
      width: 100%;
      height: 100%;
      display: block;
    }

    .reel-video-title {
      margin-top: 0.75rem;
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    /* ── PLAYLIST SIDE ───────────────────────────────────── */
    .reel-playlist-col {
      width: 260px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      max-height: 70vh;
      overflow-y: auto;
    }

    .reel-playlist-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 0.75rem;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background 0.15s;
    }

    .reel-playlist-item:hover {
      background: rgba(0,0,0,0.05);
    }

    .reel-playlist-item.active {
      border-color: var(--border);
      background: var(--bg2);
    }

    .reel-playlist-thumb {
      width: 72px;
      flex-shrink: 0;
      aspect-ratio: 16/9;
      overflow: hidden;
      background: #000;
    }

    .reel-playlist-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.85;
      transition: opacity 0.15s;
      display: block;
    }

    .reel-playlist-item:hover .reel-playlist-thumb img,
    .reel-playlist-item.active .reel-playlist-thumb img {
      opacity: 1;
    }

    .reel-playlist-info {
      flex: 1;
      min-width: 0;
    }

    .reel-playlist-num {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .reel-playlist-name {
      font-size: 0.8rem;
      line-height: 1.3;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── FOOTER ──────────────────────────────────────────── */
    .reel-footer {
      padding: 1.5rem 2rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
    }

    .reel-footer img {
      height: 28px;
      width: auto;
      opacity: 0.6;
      transition: opacity 0.2s;
    }

    .reel-footer a:hover img { opacity: 1; }

    .reel-footer-social {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .reel-footer-social a {
      display: block;
      color: var(--muted);
      opacity: 0.6;
      transition: opacity 0.2s;
    }

    .reel-footer-social a:hover { opacity: 1; }

    .reel-footer-social svg {
      height: 22px;
      width: auto;
      display: block;
    }

    /* ── LOADING / ERROR ─────────────────────────────────── */
    .reel-message {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      color: var(--muted);
      padding: 4rem;
    }

    /* ── MOBILE ──────────────────────────────────────────── */
    @media (max-width: 767px) {
      .reel-layout {
        flex-direction: column;
        padding: 1rem;
        gap: 1rem;
      }

      .reel-playlist-col {
        width: 100%;
        max-height: 40vh;
      }

      .reel-header { padding: 1rem; }
    }
  </style>
</head>
