<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kevin Haus — Director</title>
  <link rel="canonical" href="https://kevinhaus.com/">
  <meta name="description" content="Director of music videos, commercials, branded content and narrative short films. NYC based.">
  <meta property="og:title" content="Kevin Haus | Director">
  <meta property="og:description" content="Director of music videos, commercials, branded content and narrative short films.">
  <meta property="og:image" content="https://test.kevinhaus.com/assets/OG_image.png">
  <meta property="og:url" content="https://kevinhaus.com/">
  <link rel="icon" type="image/png" sizes="32x32" href="https://test.kevinhaus.com/assets/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="https://test.kevinhaus.com/assets/favicon-16x16.png">
  <link rel="apple-touch-icon" href="https://test.kevinhaus.com/assets/apple-touch-icon.png">
  <script type="module" src="./js/main.js"></script>
  <script type="module" src="./js/home.js"></script>
</head>
<body>

  <!-- Nav injected by JS -->
  <div id="kh-nav-mount"></div>

  <main class="kh-page">
    <div class="kh-home">

      <!-- Main logo -->
      <div class="kh-home-logo">
        <img
          src="https://test.kevinhaus.com/assets/MainLogo_blk.png"
          data-logo-light="https://test.kevinhaus.com/assets/MainLogo_blk.png"
          data-logo-dark="https://test.kevinhaus.com/assets/MainLogo_wht.png"
          data-logo-swap
          alt="directed by: Kevin Haus"
          id="mainLogo"
        >
      </div>

      <!-- Cycling still image -->
      <div class="kh-still-wrap" id="stillWrap" title="Click to watch this video">
        <img
          src=""
          alt=""
          class="kh-still"
          id="stillImg"
          loading="eager"
        >
      </div>
      <p class="kh-still-hint">click image to watch</p>

    </div>

    <!-- Footer -->
    <footer class="kh-footer">
      <div class="kh-footer-logo">
        <img
          src="https://test.kevinhaus.com/assets/KH_square.svg"
          alt="KH"
        >
      </div>
      <a href="mailto:hello@kevinhaus.com" class="kh-footer-email">hello@kevinhaus.com</a>
    </footer>
  </main>

</body>
</html>
